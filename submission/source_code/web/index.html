<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task 3 Trust Prototype</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel intro">
        <p class="eyebrow">ISSR Task 3</p>
        <h1>Recommendation Acceptance Task</h1>
        <p class="lede">
          One cue changes across participants: assistant name and tone. The AI recommends one option.
          The participant chooses whether to accept or reject it.
        </p>
      </section>

      <section class="panel" id="task-panel" hidden>
        <div class="meta">
          <span id="participant-pill" class="pill"></span>
          <span id="condition-pill" class="pill"></span>
        </div>
        <div class="agent-card">
          <div class="agent-header">
            <p class="agent-name" id="agent-name"></p>
            <p class="agent-tone" id="agent-tone"></p>
          </div>
          <h2 id="headline"></h2>
          <p id="message"></p>
          <div class="recommendation-box">
            <span class="label">Recommended option</span>
            <strong id="recommended-option">Option A</strong>
          </div>
        </div>
        <div class="actions">
          <button id="accept-btn" class="primary">Accept Recommendation</button>
          <button id="reject-btn" class="secondary">Reject Recommendation</button>
        </div>
        <p id="status-line" class="status"></p>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
